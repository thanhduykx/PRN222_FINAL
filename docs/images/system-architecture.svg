<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1120" viewBox="0 0 1800 1120" role="img" aria-labelledby="title desc">
  <title id="title">Sơ đồ kiến trúc thư mục EduVietRAG</title>
  <desc id="desc">Sơ đồ các thư mục chính trong Web, BLL và DAL, cùng PostgreSQL và dịch vụ ngoài. External Services chỉ kết nối với BLL. Mỗi kết nối đều phân biệt request và response.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#f8fafc"/><stop offset="1" stop-color="#eef2ff"/></linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="7" stdDeviation="9" flood-color="#0f172a" flood-opacity=".10"/></filter>
    <marker id="req" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0v6l9-3z" fill="#2563eb"/></marker>
    <marker id="res" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0v6l9-3z" fill="#059669"/></marker>
    <style>text{font-family:Inter,Segoe UI,Arial,sans-serif;fill:#0f172a}.title{font-size:42px;font-weight:700}.subtitle{font-size:18px;fill:#475569}.head{font-size:25px;font-weight:700}.card{font-size:18px;font-weight:650}.small{font-size:15px;fill:#475569}.label{font-size:15px;font-weight:700}.blue{fill:#1d4ed8}.green{fill:#047857}</style>
  </defs>
  <rect width="1800" height="1120" fill="url(#bg)"/>
  <text x="900" y="58" text-anchor="middle" class="title">EduVietRAG — Project Folder Architecture</text>
  <text x="900" y="90" text-anchor="middle" class="subtitle">REQUEST • RESPONSE</text>

  <g filter="url(#shadow)"><rect x="300" y="125" width="1050" height="195" rx="23" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/><text x="825" y="167" text-anchor="middle" class="head" fill="#1d4ed8">Presentation Layer — Web / Razor Pages</text>
    <rect x="430" y="195" width="205" height="88" rx="13" fill="#fff" stroke="#60a5fa" stroke-width="2"/><text x="532" y="230" text-anchor="middle" class="card">Pages/</text><text x="532" y="258" text-anchor="middle" class="small">App_Data/</text>
    <rect x="655" y="195" width="230" height="88" rx="13" fill="#fff" stroke="#60a5fa" stroke-width="2"/><text x="770" y="230" text-anchor="middle" class="card">Models/</text><text x="770" y="258" text-anchor="middle" class="small">ViewModels/</text>
    <rect x="905" y="195" width="195" height="88" rx="13" fill="#fff" stroke="#60a5fa" stroke-width="2"/><text x="1002" y="230" text-anchor="middle" class="card">Hubs/</text><text x="1002" y="258" text-anchor="middle" class="small">Services/</text>
    <rect x="1120" y="195" width="200" height="88" rx="13" fill="#fff" stroke="#60a5fa" stroke-width="2"/><text x="1220" y="230" text-anchor="middle" class="card">Security/</text><text x="1220" y="258" text-anchor="middle" class="small">wwwroot/</text>
  </g>

  <g filter="url(#shadow)"><rect x="300" y="400" width="1050" height="205" rx="23" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/><text x="825" y="444" text-anchor="middle" class="head" fill="#166534">Business Logic Layer — BLL</text>
    <rect x="430" y="477" width="205" height="86" rx="13" fill="#fff" stroke="#4ade80" stroke-width="2"/><text x="532" y="512" text-anchor="middle" class="card">Contracts/</text><text x="532" y="540" text-anchor="middle" class="small">DependencyInjection/</text>
    <rect x="655" y="477" width="230" height="86" rx="13" fill="#fff" stroke="#4ade80" stroke-width="2"/><text x="770" y="512" text-anchor="middle" class="card">Models/</text><text x="770" y="540" text-anchor="middle" class="small">Mapping/</text>
