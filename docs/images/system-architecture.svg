    <rect x="905" y="762" width="195" height="70" rx="13" fill="#fff" stroke="#fb923c" stroke-width="2"/><text x="1002" y="792" text-anchor="middle" class="card">Repositories/</text><text x="1002" y="817" text-anchor="middle" class="small">Mapping/</text>
    <rect x="1120" y="762" width="200" height="70" rx="13" fill="#fff" stroke="#fb923c" stroke-width="2"/><text x="1220" y="792" text-anchor="middle" class="card">DataContracts/</text><text x="1220" y="817" text-anchor="middle" class="small">Schema/</text>
  </g>

  <g filter="url(#shadow)"><path d="M610 965c0-26 118-47 265-47s265 21 265 47v60c0 26-118 47-265 47s-265-21-265-47z" fill="#ccfbf1" stroke="#0f766e" stroke-width="3"/><ellipse cx="875" cy="965" rx="265" ry="47" fill="#ecfeff" stroke="#0f766e" stroke-width="3"/><text x="875" y="972" text-anchor="middle" class="head" fill="#115e59">PostgreSQL Database</text><text x="875" y="1023" text-anchor="middle" class="card" fill="#0f766e">Supabase</text></g>

  <g filter="url(#shadow)"><rect x="1440" y="125" width="310" height="830" rx="24" fill="#f3e8ff" stroke="#7e22ce" stroke-width="3"/><text x="1595" y="165" text-anchor="middle" class="head" fill="#6b21a8">External Services</text>
