    <rect x="1120" y="477" width="200" height="86" rx="13" fill="#fff" stroke="#4ade80" stroke-width="2"/><text x="1220" y="512" text-anchor="middle" class="card">Options/</text><text x="1220" y="540" text-anchor="middle" class="small">Security/</text>
  </g>

